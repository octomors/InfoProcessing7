<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бинаризация изображения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

  <main class="page">
    <header class="hero">
      <h1>Бинаризация изображения</h1>
      <p>Загрузите картинку, выберите режим и получите черно-белый результат прямо в браузере.</p>
    </header>

    <section class="controls card">
      <label class="upload" for="fileInput">
        <span class="upload-title">Выбрать изображение</span>
        <span class="upload-hint">PNG, JPG, WEBP</span>
      </label>
      <input id="fileInput" type="file" accept="image/*">

      <fieldset class="method-group">
        <legend>Способ бинаризации</legend>
        <label>
          <input type="radio" name="method" value="manual" checked>
          Ручной порог
        </label>
        <label>
          <input type="radio" name="method" value="otsu">
          Автоматический порог (Otsu)
        </label>
      </fieldset>

      <div class="slider-wrap" id="sliderWrap">
        <label for="thresholdRange">Порог: <strong id="thresholdValue">128</strong></label>
        <input id="thresholdRange" type="range" min="0" max="255" value="128">
      </div>

      <p class="meta" id="infoText">Загрузите изображение, чтобы начать.</p>
      <button id="downloadBtn" type="button" disabled>Скачать результат</button>
    </section>

    <section class="preview-grid">
      <article class="card canvas-card">
        <h2>Исходное</h2>
        <canvas id="sourceCanvas" aria-label="Исходное изображение"></canvas>
      </article>
      <article class="card canvas-card">
        <h2>Бинаризованное</h2>
        <canvas id="resultCanvas" aria-label="Бинаризованное изображение"></canvas>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
